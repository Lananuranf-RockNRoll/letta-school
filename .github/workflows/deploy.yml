name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scan (GitLeaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      run: npm install
      working-directory: ./frontend

    - name: Frontend dependency audit
      run: npm audit --audit-level=high
      working-directory: ./frontend

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Download Go modules
      run: go mod download
      working-directory: ./backend

    - name: Backend dependency audit
      run: govulncheck ./...
      working-directory: ./backend

  sast-scan:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SAST Scan (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/golang
            p/nodejs
            p/owasp-top-ten
            p/secrets

  container-scan:
    runs-on: ubuntu-latest
    needs: [security-scan, dependency-scan, sast-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t letta-school-backend:test ./backend

      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'letta-school-backend:test'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Build frontend image
        run: docker build -t letta-school-frontend:test ./frontend

      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'letta-school-frontend:test'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  deploy:
    runs-on: ubuntu-latest
    needs: container-scan
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/letta-school
            git fetch origin
            git reset --hard origin/main
            sed -i '/^CLOUDINARY/d' .env
            echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" >> .env
            echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> .env
            echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}" >> .env
            docker compose up --build -d
            docker image prune -f